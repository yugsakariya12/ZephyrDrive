name: ZephyrDrive Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Run Test Suites
      run: npx vitest run

    - name: Compile Production Bundle
      run: npm run build
      env:
        JWT_SECRET: "ci-test-secret-key-placeholder-string-value"
        MONGODB_URI: "mongodb://localhost:27017/test-database"
